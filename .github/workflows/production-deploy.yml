name: production-deploy

on:
  push:
    branches:
      - production #TODO: change this to prod branch in future

permissions:
  contents: read

# Cancel an in-flight deploy if a newer commit lands on production.
concurrency:
  group: production-deploy
  cancel-in-progress: false

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test -- --run

      - name: Create .env
        run: |
          touch .env
          echo "VITE_API_BASE_URL=${{ secrets.VITE_API_BASE_URL_PRODUCTION }}" >> .env
          echo "VITE_APP_NAME=${{ vars.VITE_APP_NAME }}" >> .env
          echo "VITE_SENTRY_DSN=${{ secrets.VITE_SENTRY_DSN }}" >> .env
          echo "VITE_PERSIST_ENCRYPT_KEY=${{ secrets.VITE_PERSIST_ENCRYPT_KEY_PRODUCTION }}" >> .env
          echo "VITE_ENABLE_ERROR_LOGGING=true" >> .env
          echo "VITE_ENABLE_QUERY_DEVTOOLS=false" >> .env
          echo "VITE_ENABLE_OPTIMISTIC_UPDATES=true" >> .env
          echo "VITE_ENABLE_PREFETCHING=true" >> .env

      - name: Build
        run: npm run build

      - name: Enforce bundle-size budgets
        run: npm run size:check

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist
          retention-days: 7

  deploy:
    name: Deploy
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: production
      # url: https://app.example.com   # uncomment once the URL is known
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist

