name: security

on:
  pull_request:
    branches: [main, staging]
  push:
    branches: [main]
  schedule:
    # Weekly Monday 06:00 UTC re-scan to catch new advisories on stable deps
    - cron: "0 6 * * 1"

permissions:
  contents: read

jobs:
  npm-audit:
    name: npm audit (high+)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Audit production dependencies
        run: npm run audit:ci

  secret-scan:
    name: Secret scan (TruffleHog)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          # Full history so PRs and pushes scan the actual diff range
          fetch-depth: 0

      - name: Run TruffleHog
        uses: trufflesecurity/trufflehog@main
        with:
          extra_args: --results=verified,unknown
